<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&amp;display=swap');
    </style>
  </defs>

  <!-- Panda head circle -->
  <circle cx="56" cy="56" r="38" fill="#0d0d0f" stroke="#E14B87" stroke-width="2"/>

  <!-- Panda ears -->
  <circle cx="26" cy="24" r="13" fill="#1a1a1f"/>
  <circle cx="86" cy="24" r="13" fill="#1a1a1f"/>
  <!-- Ear inner pink -->
  <circle cx="26" cy="24" r="7" fill="#E14B87" opacity="0.4"/>
  <circle cx="86" cy="24" r="7" fill="#E14B87" opacity="0.4"/>

  <!-- Eye patches (dark) -->
  <ellipse cx="42" cy="52" rx="11" ry="10" fill="#1a1a1f" transform="rotate(-12 42 52)"/>
  <ellipse cx="70" cy="52" rx="11" ry="10" fill="#1a1a1f" transform="rotate(12 70 52)"/>

  <!-- Eyes (pink pupils) -->
  <circle cx="42" cy="53" r="5" fill="#E14B87"/>
  <circle cx="70" cy="53" r="5" fill="#E14B87"/>
  <!-- Eye shine -->
  <circle cx="44" cy="51" r="2" fill="white" opacity="0.9"/>
  <circle cx="72" cy="51" r="2" fill="white" opacity="0.9"/>

  <!-- Nose -->
  <ellipse cx="56" cy="63" rx="5" ry="3.5" fill="#2a2a30"/>

  <!-- Tiny gavel -->
  <rect x="47" y="74" width="18" height="5" rx="2.5" fill="#E14B87" opacity="0.85"/>
  <rect x="53" y="79" width="6" height="9" rx="1.5" fill="#E14B87" opacity="0.6"/>

  <!-- Text block -->
  <!-- PANDA GAMES -->
  <text x="110" y="50" font-family="'Space Grotesk', 'Arial Black', sans-serif" font-weight="800" font-size="32" fill="white" letter-spacing="1">PANDA</text>
  <text x="110" y="86" font-family="'Space Grotesk', 'Arial Black', sans-serif" font-weight="700" font-size="32" fill="#E14B87" letter-spacing="2">GAMES</text>

  <!-- Small tag line -->
  <text x="111" y="104" font-family="'Space Grotesk', 'Arial', sans-serif" font-weight="400" font-size="10" fill="#666680" letter-spacing="3">IPSC · CASE AC-2026</text>

</svg>
