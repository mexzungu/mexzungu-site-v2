<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pepe Carrillo — Links</title>
    <link rel="icon" href="/favicon.ico">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=RocknRoll+One&family=Space+Grotesk:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', Arial, sans-serif;
            background: #2A1F1A;
            color: #FAFAFA;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #E14B87;
            margin-bottom: 16px;
        }
        h1 {
            font-family: 'RocknRoll One', sans-serif;
            font-size: 22px;
            margin-bottom: 4px;
        }
        .subtitle {
            color: #9A8F88;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .link {
            display: block;
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .link-primary {
            background: #E14B87;
            color: #FFFFFF;
        }
        .link-primary:hover {
            background: #B83A6B;
            transform: translateY(-2px);
        }
        .link-secondary {
            background: rgba(255,255,255,0.08);
            color: #FAFAFA;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .link-secondary:hover {
            background: rgba(255,255,255,0.12);
            transform: translateY(-2px);
        }
        .link-gold {
            background: rgba(212,160,57,0.15);
            color: #D4A039;
            border: 1px solid rgba(212,160,57,0.3);
        }
        .link-gold:hover {
            background: rgba(212,160,57,0.25);
            transform: translateY(-2px);
        }
        .section-label {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #E14B87;
            margin: 24px 0 12px;
        }
        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #6B5E57;
        }
        .footer a { color: #9A8F88; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://api.mexzungu.com/static/pepe-headshot.jpg" alt="Pepe Carrillo" class="avatar">
        <h1>Pepe Carrillo</h1>
        <p class="subtitle">Venture Architect &middot; Founder, Mexzungu Group</p>

        <div class="section-label">⚡ Latest</div>
        <a href="https://mexzungu.com/outlaw-chronicles/" class="link link-primary">The Outlaw Chronicles — Newsletter</a>
        <a href="https://docs.google.com/spreadsheets/d/1l2G4UlI4Y6XA4pdUgfO_UgiZq807kEIHK2B1kSIO_TE/copy" class="link link-gold">Free Cap Table Calculator</a>

        <div class="section-label">Learn more</div>
        <a href="https://mexzungu.com" class="link link-secondary">Mexzungu Group</a>
        <a href="https://mexzungu.com/venture-architecture/" class="link link-secondary">Venture Architecture</a>
        <a href="https://mexzungu.com/rebel-capital/" class="link link-secondary">Rebel Capital</a>
        <a href="https://mexzungu.com/ai-ninja-factory/" class="link link-secondary">AI Ninja Factory</a>
        <a href="https://pepecarrillo.co" class="link link-secondary">pepecarrillo.co</a>

        <div class="section-label">Connect</div>
        <a href="https://mexzungu.com/lets-jam/" class="link link-primary">Let's Jam — Book a Call</a>
        <a href="https://www.linkedin.com/in/pepe-around-the-globe/" class="link link-secondary">LinkedIn</a>

        <p class="footer">
            <a href="https://mexzungu.com">mexzungu.com</a> &middot; Barcelona
        </p>
    </div>
</body>
</html>
